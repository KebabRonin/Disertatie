# Disertatie Project Configuration
# ================================

# Framsticks Installation Path
# Supports both absolute and relative paths (relative to Disertatie folder)
framsticks:
  # Absolute path to Framsticks (uncomment and modify if needed)
  # path: "/home/xwiki/Documents/fac/GECCO_Robot_Body/Framsticks54"

  # Or use relative path (relative to Disertatie folder)
  # Examples:
  #   "../Framsticks54"      (parent directory)
  #   "./Framsticks"         (inside Disertatie)
  #   "../Framsticks"        (alternative)
  path: "./Framsticks54"

  # Fallback paths to try if primary path doesn't exist
  fallback_paths:
    - "../Framsticks"
    - "./Framsticks"



# Database Configuration
database:
  path: "algo_runs.db"  # Path relative to Disertatie folder

# Experiment Configuration
experiments:
  results_dir: "experiments"  # Relative to Disertatie folder
  simfiles_path: "./framspy"
